<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking App V2</title>
 
<script src="app.js" defer></script>
<link rel="stylesheet" href="./style.css">
 
</head>

<body>
<div class="container">

<h2>⚔️ Ranking V2</h2>

<input id="itemInput" placeholder="Legg til item">
  
<div id="rankingOverlay">
  <div id="rankingView">
    <button onclick="closeRankingView()">⬅️ Tilbake</button>

    <!-- SORTERING -->
    <div style="margin:10px 0;">
      <button onclick="setSort('elo')">⭐ ELO</button>
      <button onclick="setSort('wins')">🏆 Wins</button>
      <button onclick="setSort('top3')">🥇 Top 3</button>
    </div>

    <!-- FILTER -->
    <div id="rankingFilters" style="margin-bottom:10px;"></div>

    <div id="rankingViewList"></div>
  </div>
</div>

<div id="statsOverlay">
  <div id="statsView">
    <button onclick="closeStats()">⬅️ Tilbake</button>

    <div id="statsContent"></div>
  </div>
</div>

<div class="chip-container" id="chipBox"></div>

<input id="catInput" placeholder="Ny kategori">
<button onclick="addCategory()">+ Kategori</button>

<button onclick="addItem()">Legg til</button>

<div class="vs">
  <div class="choice" id="a" onclick="pick(0)">-</div>
  <div class="choice" id="b" onclick="pick(1)">-</div>
</div>

<button onclick="draw()">Uavgjort</button>

<div id="ranking"></div>

<hr>

<h3>🏆 Turnering</h3>
<button onclick="startTournament()">Start turnering</button>

<div id="bracket"></div>

<h3>Daglig turnering</h3>
<div id="tournament"></div>

</div>

<button onclick="scrollToTop()" style="
  position:fixed;
  bottom:20px;
  right:20px;
  width:auto;
  padding:10px 12px;
  border-radius:50%;
  display:none;
" id="scrollBtn">
  ⬆
</button>


</body>
</html>
