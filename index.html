<!DOCTYPE html>
<html>
<head>
  <title>Ranking App</title>

  <style>
    body {
      font-family: system-ui, Arial;
      background: linear-gradient(180deg, #0f0f0f, #1a1a1a);
      color: white;
      text-align: center;
      margin: 0;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 80%;
      padding: 12px;
      margin: 6px;
      border-radius: 12px;
      border: none;
      background: #222;
      color: white;
    }

    button {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      margin: 6px;
      background: #4f8cff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .vs {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .choice {
      flex: 1;
      padding: 25px;
      background: #1f1f1f;
      border-radius: 16px;
      cursor: pointer;
      user-select: none;
    }

    #ranking {
      margin-top: 20px;
      text-align: left;
      background: #151515;
      padding: 10px;
      border-radius: 10px;
    }

    /* dropdown */
    .dropdown {
      position: relative;
      margin: 10px 0;
    }

  .dropdown-btn {
  width: 100%;
  padding: 12px;
  background: #1f1f1f;
  border-radius: 12px;
  color: white;
  font-weight: 600;
  cursor: pointer;

  display: flex;
  justify-content: space-between;
  align-items: center;
}

.dropdown-btn:hover {
  background: #262626;
}

    .dropdown-content {
  display: none;
  position: absolute;
  background: #1a1a1a;
  width: 100%;
  max-height: 220px;
  overflow-y: auto;
  border-radius: 14px;
  margin-top: 8px;
  padding: 8px;
  z-index: 10;

  box-shadow: 0 12px 30px rgba(0,0,0,0.5);
  border: 1px solid #2a2a2a;
}

.dropdown-content.show {
  display: block;
}

.category-item {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 8px;

  padding: 10px 10px;
  border-radius: 10px;

  cursor: pointer;
  font-size: 14px;

  transition: 0.15s;
}

.category-item span {
  flex: 1;
  text-align: left;
}

.category-item:hover {
  background: #2a2a2a;
}

.category-item input {
  width: 16px;
  height: 16px;
  margin: 0;

  accent-color: #4f8cff;

  cursor: pointer;
}

  </style>
</head>

<body>

<div class="container">

  <h1>⚔️ Ranking App</h1>

  <input id="newItem" placeholder="Legg til noe">

 <div class="dropdown">
  <div class="dropdown-btn" onclick="toggleDropdown()">
    <span id="dropdownLabel">Velg kategorier</span>
    ⬇️
  </div>

    <div id="categoryDropdown" class="dropdown-content"></div>
  </div>

  <button onclick="addItem()">Legg til</button>

  <input id="newCategoryInput" placeholder="Ny kategori">
<button onclick="addCategory()">+ Kategori</button>

  <div class="vs">
    <div class="choice" onclick="choose(0)" id="a">-</div>
    <div class="choice" onclick="choose(1)" id="b">-</div>
  </div>

  <button onclick="draw()">🤝 Uavgjort</button>

  <div id="ranking"></div>

</div>

<script>

let items = JSON.parse(localStorage.getItem("items")) || [];
if (!Array.isArray(items)) items = [];

items = items.map(item => ({
  id: item.id || Date.now() + Math.random(),
  name: item.name,
  categories: item.categories || (item.category ? [item.category] : []),
  rating: item.rating || 1000
}));

/* ---------------- HELPERS ---------------- */

function save() {
  localStorage.setItem("items", JSON.stringify(items));
}

function normalizeCategory(cat) {
  if (!cat) return null;
  return cat.trim().toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

/* ---------------- CATEGORIES (DERIVED) ---------------- */

function getCategories() {
  let cats = [];

  items.forEach(item => {
    let itemCats = item.categories || [];

    itemCats.forEach(c => {
      let norm = normalizeCategory(c);
      if (norm) cats.push(norm);
    });
  });

  return [...new Set(cats)];
}

function addCategory() {
  const input = document.getElementById("newCategoryInput").value;
  const cat = normalizeCategory(input);

  if (!cat) return;

  // legg til "dummy item system" for å holde det robust
  let exists = items.some(item =>
    (item.categories || []).includes(cat)
  );

  if (!exists) {
    items.push({
      id: Date.now() + Math.random(),
      name: "__category_seed__",
      categories: [cat],
      rating: 1000
    });
  }

  document.getElementById("newCategoryInput").value = "";

  save();
  update();
  newMatch();
  renderCategories();
}

/* ---------------- UI ---------------- */

function toggleDropdown() {
  document.getElementById("categoryDropdown").classList.toggle("show");
}

function renderCategories() {
  const categories = getCategories();
  const container = document.getElementById("categoryDropdown");

  container.innerHTML = categories.map(cat => `
    <label class="category-item">
      <input type="checkbox" value="${cat}">
      <span>${cat}</span>
    </label>
  `).join("");
}

/* ---------------- ADD ITEM ---------------- */

function addItem() {
  const name = document.getElementById("newItem").value;

  const selectedCategories = [...document.querySelectorAll("#categoryDropdown input:checked")]
    .map(cb => cb.value);

  if (!name || selectedCategories.length === 0) return;

  items.push({
    id: Date.now() + Math.random(),
    name,
    categories: selectedCategories,
    rating: 1000
  });

  document.getElementById("newItem").value = "";
  document.querySelectorAll("#categoryDropdown input").forEach(cb => cb.checked = false);

  save();
  update();
  newMatch();
}

/* ---------------- ELO ---------------- */

function expected(a, b) {
  return 1 / (1 + Math.pow(10, (b - a) / 400));
}

function updateElo(w, l) {
  const K = 32;
  const Ew = expected(w.rating, l.rating);

  w.rating += K * (1 - Ew);
  l.rating += K * (0 - (1 - Ew));
}

/* ---------------- MATCH ---------------- */

let current = [];

function newMatch() {
  if (items.length < 2) {
    document.getElementById("a").innerText = "Legg til flere items";
    document.getElementById("b").innerText = "";
    return;
  }

  let a = Math.floor(Math.random() * items.length);
  let b;

  do { b = Math.floor(Math.random() * items.length); }
  while (a === b);

  current = [items[a], items[b]];

  document.getElementById("a").innerText = current[0].name;
  document.getElementById("b").innerText = current[1].name;
}

function choose(i) {
  if (!current.length) return;

  updateElo(current[i], current[1 - i]);

  save();
  update();
  newMatch();
}

function draw() {
  if (!current.length) return;

  const K = 32;
  let a = current[0];
  let b = current[1];

  let Ea = expected(a.rating, b.rating);
  let Eb = expected(b.rating, a.rating);

  a.rating += K * (0.5 - Ea);
  b.rating += K * (0.5 - Eb);

  save();
  update();
  newMatch();
}

/* ---------------- RANKING ---------------- */

function update() {
  const sorted = [...items].sort((a, b) => b.rating - a.rating);

  document.getElementById("ranking").innerHTML =
    "<h3>🏆 Ranking</h3>" +
    sorted.map((x, i) =>
      `${i + 1}. ${x.name} 
<span onclick="editItemCategories(${x.id})" style="cursor:pointer; color:#4f8cff;">
[${(x.categories || []).join(", ") || "ingen"}]
</span>
 (${Math.round(x.rating)})`
    ).join("<br>");
}

function editItemCategories(id) {
  let item = items.find(x => x.id === id);
  if (!item) return;

  let current = (item.categories || []).join(", ");

  let input = prompt("Rediger kategorier (kommaseparert):", current);

  if (input === null) return;

  item.categories = input
    .split(",")
    .map(c => normalizeCategory(c))
    .filter(Boolean);

  save();
  update();
}

/* ---------------- INIT ---------------- */

renderCategories();
update();
newMatch();

document.getElementById("newItem").addEventListener("keydown", e => {
  if (e.key === "Enter") addItem();
});

document.addEventListener("click", function (e) {
  const dropdown = document.getElementById("categoryDropdown");
  const btn = document.querySelector(".dropdown-btn");

  if (!dropdown.contains(e.target) && !btn.contains(e.target)) {
    dropdown.classList.remove("show");
  }
});

function updateDropdownLabel() {
  const checked = [...document.querySelectorAll("#categoryDropdown input:checked")]
    .map(cb => cb.value);

  const label = document.getElementById("dropdownLabel");

  if (!label) return;

  if (checked.length === 0) {
    label.innerText = "Velg kategorier";
  } else if (checked.length <= 2) {
    label.innerText = checked.join(", ");
  } else {
    label.innerText = `${checked.length} valgt`;
  }
}
onchange="updateDropdownLabel()"

</script>

</body>
</html>
