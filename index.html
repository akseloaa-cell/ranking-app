<!DOCTYPE html>
<html> 
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking App V2</title>

<link rel="icon" type="image/png" href="file_000000006acc720aabe74bd60fd54078.png"> 
 
<script type="module" src="main.js"></script>

<link rel="stylesheet" href="./style.css">
 
</head>

<body>

<div id="menuBtn" onclick="toggleMenu()" style="
  position: fixed;
  top: 18px;
  right: 18px;
  width: 44px;
  height: 44px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#1f1f1f;
  border-radius:14px;
  font-size:24px;
  cursor:pointer;
  z-index:9999;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
">
 ☰
</div>

<div id="modeMenu" style="
  position: fixed;
  top: 70px;
  right: 18px;
  background: #1f1f1f;
  border-radius: 16px;
  padding: 8px;
  display: none;
  flex-direction: column;
  gap: 8px;
  z-index: 9999;
  min-width: 170px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
">
 
<div class="menuItem"
     onclick="setMode('home'); setActiveMenu(this); closeMenu();">
  🏠 Home
</div>

<div class="menuItem"
     onclick="openCategoryVs(); setActiveMenu(this); closeMenu();">
  ⚔️ Versus
</div>

<div class="menuItem"
     onclick="setMode('tournament'); setActiveMenu(this); closeMenu();">
  🏆 Tournament
</div>

</div>

<div id="homeView" class="container">

<h2>⚔️ Ranking V2</h2>

<div id="rankingOverlay">
  <div id="rankingView">
    <button onclick="closeRankingView()">⬅️ Tilbake</button>

    <!-- SORTERING -->
    <div style="margin:10px 0;">
      <button onclick="setSort('elo')">⭐ ELO</button>
      <button onclick="setSort('wins')">🏆 Wins</button>
      <button onclick="setSort('top3')">🥇 Top 3</button>
    </div>

    <!-- FILTER -->
   <input
  id="rankingCatSearch"
  placeholder="Søk kategori..."
  oninput="renderRankingFilters(this.value)"
  style="
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    background:#151a24;
    color:white;
  "
/>
    <div class="chip-container" id="rankingFilters" style="margin-bottom:10px;"></div>

    <div id="rankingViewList"></div>
  </div>
</div>

<div id="statsOverlay">
  <div id="statsView">
    <button onclick="closeStats()">⬅️ Tilbake</button>

    <div id="statsContent"></div>
  </div>
</div>

<div class="vs">
  <div class="choice" id="a"></div>
<div class="choice" id="b"></div>
</div>

<button onclick="draw()">🤝 Uavgjort</button>

<div class="action-row">

  <button onclick="openRankingView()" style="
    flex: 1;
    padding: 12px;
    margin-right: 10px;
    border-radius: 12px;
    background: #1f1f1f;
    color: white;
    border: 1px solid #2a3142;
    cursor: pointer;
    font-weight: bold;
  ">
    🏆 Full ranking
  </button>

  <button onclick="openAddItem()" style="
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #4f8cff;
    color: white;
    border: none;
    font-size: 26px;
    cursor: pointer;
    flex-shrink: 0;
  ">
    +
  </button>

</div>

<div id="ranking"></div>

<hr style="display:none;">

<div id="tournamentSection" style="display:none;">

  <h3>🏆 Turnering</h3>
  <button onclick="startTournament()">Start turnering</button>

  <div id="bracket"></div>

  <h3>Daglig turnering</h3>
  <div id="tournament"></div>

</div>

</div>

 <!-- CATEGORY SELECT -->

<div id="categorySelectView" style="display:none;">

  <div class="vs-header">
    <h1>⚔️ Versus</h1>

    <input
      id="vsCategorySearch"
      placeholder="Søk kategori..."
      oninput="renderVsCategories(this.value)"
    >
  </div>

  <div id="vsCategoryList"></div>

</div>


<!-- CATEGORY BATTLE -->

<div id="categoryBattleView" style="display:none;">

  <div class="battle-topbar">

    <button onclick="backToCategorySelect()" class="battle-back">
      ← Categories
    </button>

    <div id="battleCategoryTitle">
      ⚔️ Category
    </div>

  </div>

  <div id="battleArena">

    <div id="battleCardA" class="battle-card"></div>

    <div class="battle-vs">
      VS
    </div>

    <div id="battleCardB" class="battle-card"></div>

  </div>

  <div class="battle-buttons">

    <button id="battlePickA"></button>

    <button onclick="categoryDraw()">
      Draw
    </button>

    <button id="battlePickB"></button>

  </div>

</div>
 
<button onclick="scrollToTop()" style="
  position:fixed;
  bottom:20px;
  right:20px;
  width:auto;
  padding:10px 12px;
  border-radius:50%;
  display:none;
" id="scrollBtn">
  ⬆
</button>

 <div id="addOverlay">
  <div id="addView">

    <button onclick="closeAddItem()">⬇️ Lukk</button>

    <h3>Legg til item</h3>

    <input id="itemInput" placeholder="Navn">

    <!-- SØK -->
   <input id="catSearch" placeholder="Søk kategori..."
  oninput="renderChips({
    filter: this.value,
    targetId: 'chipBox',
    mode: 'select'
  })"
/>

    <!-- CHIPS -->
    <div class="chip-container" id="chipBox"></div>

    <!-- NY CATEGORY -->
    <input id="catInput" placeholder="Ny kategori">
    <button onclick="addCategory()">+ Kategori</button>

    <button onclick="addItem()">Legg til</button>

  </div>
</div>

</body>
</html>
