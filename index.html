<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking App V2</title>

<style>
body {
  font-family: system-ui;
  background: linear-gradient(180deg,#0f0f0f,#1a1a1a);
  color:white;
  margin:0;
  text-align:center;
}

.container {
  max-width:420px;
  margin:auto;
  padding:16px;
}

input, button {
  width:80%;
  margin:6px auto;
  display:block;
  padding:12px;
  border-radius:10px;
  border:none;
}

input { background:#222; color:white; }

button {
  background:#4f8cff;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* CHIPS */
.chip-container {
  width:80%;
  margin:auto;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

.chip {
  padding:8px 12px;
  background:#222;
  border-radius:999px;
  cursor:pointer;
  font-size:14px;
  color:white; /* 🔥 viktig */
  white-space:nowrap; /* 🔥 hindrer tekst i å brytes */
}

.chip-container {
  justify-content: center;
}

.chip.active {
  background:#4f8cff;
}

/* VS */
.vs {
  display:flex;
  gap:10px;
  width:80%;
  margin:20px auto;
}

.choice {
  flex:1;
  padding:25px;
  background:#1f1f1f;
  border-radius:12px;
  cursor:pointer;
}

/* BRACKET */
.bracket {
  display:flex;
  overflow-x:auto;
  width:80%;
  margin:auto;
  gap:20px;
}

.round {
  min-width:120px;
}

.match {
  background:#1f1f1f;
  margin:10px 0;
  padding:8px;
  border-radius:10px;
  font-size:12px;
}

.chip:active {
  transform: scale(0.95);
}

.choice:active {
  transform: scale(0.97);
}

button:active {
  transform: scale(0.97);
}

* {
  -webkit-tap-highlight-color: transparent;
}

</style>
</head>

<body>
<div class="container">

<h2>⚔️ Ranking V2</h2>

<input id="itemInput" placeholder="Legg til item">
  
<div id="statsBox"></div>
<div id="rankingView" style="display:none;"></div>

<div class="chip-container" id="chipBox"></div>

<input id="catInput" placeholder="Ny kategori">
<button onclick="addCategory()">+ Kategori</button>

<button onclick="addItem()">Legg til</button>

<div class="vs">
  <div class="choice" id="a" onclick="pick(0)">-</div>
  <div class="choice" id="b" onclick="pick(1)">-</div>
</div>

<button onclick="draw()">Uavgjort</button>

<button onclick="openRankingView()">📊 Åpne full ranking</button>
<div id="ranking"></div>

<hr>

<h3>🏆 Turnering</h3>
<button onclick="startTournament()">Start turnering</button>

<div id="bracket"></div>

<h3>Daglig turnering</h3>
<div id="tournament"></div>


</div>

<script>
/* ================= STATE ================= */
const state = {
  items: JSON.parse(localStorage.getItem("items")) || [],
  categories: JSON.parse(localStorage.getItem("categories")) || [],
  current: [],
  tournament: JSON.parse(localStorage.getItem("dailyTournament")) || null, // NEW
  bracket: [],
  round: 0,
  match: 0,
  showAll: false,
  rankingFilter: "all"
};
// 🔥 Rydd categories
state.categories = state.categories
  .filter(c => c && typeof c === "string" && c.trim() !== "")
  .map(c => c.trim());

state.items.forEach(i => {
  if(!i.history) i.history = [];
  if(i.history.length === 0) i.history.push(i.rating || 1000);
});

/* ================= SAVE ================= */
function save(){
  localStorage.setItem("items", JSON.stringify(state.items));
  localStorage.setItem("categories", JSON.stringify(state.categories));
}

/* ================= CATEGORY ================= */
function normalize(c){
  return c.trim().toLowerCase();
}

function addCategory(){
  let v = document.getElementById("catInput").value;

  if(!v || !v.trim()) return;

  v = normalize(v);

  if(!state.categories.includes(v)){
    state.categories.push(v);
  }

  document.getElementById("catInput").value = "";
  renderChips();
  save();
}

function renderChips(){
  const box = document.getElementById("chipBox");

  box.innerHTML = state.categories
    .filter(c => c && c.trim() !== "")
    .map(c => `
      <div class="chip" onclick="toggleCat(this)">${c}</div>
    `).join("");
}

function toggleCat(el){
  el.classList.toggle("active");
}

/* ================= ITEMS ================= */
function addItem(){
  let name = document.getElementById("itemInput").value;
  if(!name) return;

  let selected = [...document.querySelectorAll(".chip.active")]
    .map(x => x.innerText);

 state.items.push({
  id: Date.now(),
  name,
  categories: selected,
  rating: 1000,

  // NEW V3 STATS
  history: [1000],
  tournamentsPlayed: 0,
  tournamentWins: 0,
  top3: 0
});

  document.getElementById("itemInput").value = "";
  save();
  update();
  nextMatch();
}

function updateHistory(item){
  if(!item.history) item.history = [];
  item.history.push(item.rating);

  if(item.history.length > 30){
    item.history.shift();
  }
}

/* ================= MATCH ================= */
function nextMatch(){
  if(state.items.length < 2) return;

  let a = Math.floor(Math.random()*state.items.length);
  let b;

  do { b = Math.floor(Math.random()*state.items.length) }
  while(a===b);

  state.current = [state.items[a], state.items[b]];

  document.getElementById("a").innerText = state.current[0].name;
  document.getElementById("b").innerText = state.current[1].name;
}

function pick(i){
  let w = state.current[i];
  let l = state.current[1-i];

  let Ea = 1/(1+Math.pow(10,(l.rating-w.rating)/400));

  w.rating += 32*(1-Ea);
  l.rating += 32*(0-(1-Ea));
  updateHistory(w);
  updateHistory(l);

  save();
  update();
  nextMatch();
}

function draw(){
  if(!state.current.length) return;

  let a = state.current[0];
  let b = state.current[1];

  updateHistory(a);
  updateHistory(b);

  save();
  update();
  nextMatch();
}


/* ================= RANKING ================= */
function update(){
  let sorted = [...state.items]
    .sort((a,b)=>b.rating-a.rating);

  let list = state.showAll ? sorted : sorted.slice(0,10);

  const btn = `
    <button onclick="toggleRankingView()">
      ${state.showAll ? "⬆️ Vis top 10" : "📜 Se hele ranking"}
    </button>
  `;

  document.getElementById("ranking").innerHTML =
    "<h3>🏆 Ranking</h3>" +
    btn +

    list.map((x,i)=>
      `<div onclick="showStats(${x.id})"
        style="cursor:pointer; padding:10px; background:#1f1f1f; margin:5px 0; border-radius:10px;">
        ${state.showAll ? i+1 : i+1}. ${x.name} (${Math.round(x.rating)})
      </div>`
    ).join("")
    +
    btn;
}

/* ================= TOURNAMENT ================= */
function startTournament(){
  let pool = [...state.items];

  if(pool.length < 4){
    alert("Trenger flere items");
    return;
  }

  pool = pool.sort(()=>Math.random()-0.5);

  let round = [];
  for(let i=0;i<pool.length;i+=2){
    round.push({a:pool[i], b:pool[i+1], winner:null});
  }

  state.bracket = [round];
  state.round = 0;
  state.match = 0;

  renderBracket();
}

function renderBracket(){
  let html = "<div class='bracket'>";

  state.bracket.forEach((r,ri)=>{
    html += "<div class='round'>";

    r.forEach(m=>{
      html += `<div class="match">
        ${m.a.name}<br>
        ${m.b.name}
      </div>`;
    });

    html += "</div>";
  });

  html += "</div>";

  document.getElementById("bracket").innerHTML = html;
}

/* INIT */

function renderTournament(){
  const el = document.getElementById("tournament");

  if(!state.tournament){
    el.innerHTML = "Ingen turnering i dag";
    return;
  }

  const t = state.tournament;

  if(t.done){
    el.innerHTML = `
      🏆 Turnering ferdig!<br>
      Kategori: ${t.category}
    `;
    return;
  }

  const match = t.rounds[t.currentRound][t.currentMatch];

  el.innerHTML = `
    🏆 Kategori: ${t.category}<br><br>

    <div class="vs">
      <div class="choice" onclick="pickTournamentWinner(0)">
        ${match.a.name}
      </div>
      <div class="choice" onclick="pickTournamentWinner(1)">
        ${match.b.name}
      </div>
    </div>
  `;
}

function getToday(){
  return new Date().toISOString().split("T")[0];
}

function initDailyTournament(){
  const today = getToday();

  if(state.tournament && state.tournament.date === today) return;

  if(state.items.length < 4) return;

  const cats = [...new Set(state.items.flatMap(i => i.categories))];
  if(cats.length === 0) return;

  const category = cats[Math.floor(Math.random()*cats.length)];

  let pool = state.items.filter(i => i.categories.includes(category));
  if(pool.length < 4) return;

  pool = pool.sort(()=>Math.random()-0.5);

  const size = Math.pow(2, Math.floor(Math.log2(pool.length)));
  pool = pool.slice(0, size);

  let rounds = [];
  let round = [];

  for(let i=0;i<pool.length;i+=2){
    round.push({a:pool[i], b:pool[i+1], winner:null});
  }

  rounds.push(round);

  state.tournament = {
    date: today,
    category,
    rounds,
    currentRound: 0,
    currentMatch: 0,
    done:false
  };

  saveTournament();
}

function saveTournament(){
  localStorage.setItem("dailyTournament", JSON.stringify(state.tournament));
}

function pickTournamentWinner(i){
  const t = state.tournament;
  const match = t.rounds[t.currentRound][t.currentMatch];

  const winner = i === 0 ? match.a : match.b;
  const loser = i === 0 ? match.b : match.a;

  match.winner = winner.id;

  // liten ELO påvirkning
  let Ea = 1/(1+Math.pow(10,(loser.rating-winner.rating)/400));
  winner.rating += 8*(1-Ea);
  loser.rating += 8*(0-(1-Ea));

  // neste match
  t.currentMatch++;

  if(t.currentMatch >= t.rounds[t.currentRound].length){
    advanceRound();
  }

  saveTournament();
  save();
  renderTournament();
  update();
}

function advanceRound(){
  const t = state.tournament;

  let winners = t.rounds[t.currentRound]
    .map(m => m.winner ? state.items.find(x => x.id === m.winner) : null)
    .filter(Boolean);

  // 📊 stats: alle som vant en kamp = deltatt
  winners.forEach(w => {
    w.tournamentsPlayed = (w.tournamentsPlayed || 0) + 1;
  });

  // ferdig turnering
  if(winners.length === 1){
    finishTournament(winners[0]);
    return;
  }

  let next = [];

  for(let i=0;i<winners.length;i+=2){
    next.push({a:winners[i], b:winners[i+1], winner:null});
  }

  t.rounds.push(next);
  t.currentRound++;
  t.currentMatch = 0;
}

function finishTournament(winner){
  state.tournament.done = true;

  winner.tournamentWins = (winner.tournamentWins || 0) + 1;

  let sorted = [...state.items].sort((a,b)=>b.rating-a.rating);

  sorted.slice(0,3).forEach((x,i)=>{
    x.top3 = (x.top3 || 0) + 1;

    if(i===0) x.rating += 50;
    if(i===1) x.rating += 25;
    if(i===2) x.rating += 10;
  });

  save();
  saveTournament();
  update();
  renderTournament();
}

function showStats(id){
  const item = state.items.find(x => x.id === id);
  if(!item) return;

  const rank = [...state.items]
    .sort((a,b)=>b.rating-a.rating)
    .findIndex(x => x.id === id) + 1;

  const trend = item.history?.slice(-5) || [];

  document.getElementById("statsBox").innerHTML = `
    <div style="background:#111;padding:10px;border-radius:10px;margin-top:10px;">
      <b>${item.name}</b><br><br>

      🏆 Rank: ${rank}<br>
      ⭐ ELO: ${Math.round(item.rating)}<br><br>

      📂 ${item.categories.join(", ")}<br><br>

      📈 ${trend.join(" → ")}<br><br>

      🏆 Wins: ${item.tournamentWins || 0}<br>
      🥇 Top3: ${item.top3 || 0}<br>
      🎮 Played: ${item.tournamentsPlayed || 0}
    </div>
  `;
}

function toggleRankingView(){
  state.showAll = !state.showAll;
  update();
}

function openRankingView(){
  document.getElementById("rankingView").style.display = "block";
  renderRankingView();
}

function closeRankingView(){
  document.getElementById("rankingView").style.display = "none";
}

function scrollToTop(){
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function renderRankingView(){
  let sorted = [...state.items]
    .sort((a,b)=>b.rating-a.rating);

  // FILTER
  if(state.rankingFilter !== "all"){
    sorted = sorted.filter(x =>
      (x.categories || []).includes(state.rankingFilter)
    );
  }

  const cats = ["all", ...new Set(state.categories)];

  document.getElementById("rankingView").innerHTML = `

    <div style="position:sticky;top:0;background:#0f0f0f;padding:10px;z-index:10;">
      
      <button onclick="closeRankingView()">✖ Lukk</button>
      <button onclick="scrollToTop()">⬆ Top</button>

      <br><br>

      ${cats.map(c => `
        <button onclick="setRankingFilter('${c}')"
          style="margin:3px; ${state.rankingFilter===c?'background:#4f8cff':''}">
          ${c}
        </button>
      `).join("")}

    </div>

    <div style="padding:10px;">
      ${sorted.map((x,i)=>`
        <div onclick="showStats(${x.id})"
          style="padding:10px;margin:5px 0;background:#1f1f1f;border-radius:10px;">
          ${i+1}. ${x.name} (${Math.round(x.rating)})
        </div>
      `).join("")}
    </div>
  `;
}

function setRankingFilter(cat){
  state.rankingFilter = cat;
  renderRankingView();
}

renderChips();
update();
nextMatch();
initDailyTournament();
renderTournament();

</script>
</body>
</html>
