<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking App V2</title>
 
<script src="app.js" defer></script>
<link rel="stylesheet" href="./style.css">
 
</head>

<body>

<div id="menuBtn" onclick="toggleMenu()" style="
  position: fixed;
  top: 18px;
  right: 18px;
  width: 44px;
  height: 44px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#1f1f1f;
  border-radius:14px;
  font-size:24px;
  cursor:pointer;
  z-index:9999;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
">
 ☰
</div>

<div id="modeMenu" style="
  position: fixed;
  top: 70px;
  right: 18px;
  background: #1f1f1f;
  border-radius: 16px;
  padding: 8px;
  display: none;
  flex-direction: column;
  gap: 8px;
  z-index: 9999;
  min-width: 170px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
">
  <div class="menuItem" onclick="setMode('home')">🏠 Home</div>
  <div class="menuItem" onclick="setMode('versus')">⚔️ Versus</div>
  <div class="menuItem" onclick="setMode('tournament')">🏆 Tournament</div>
</div>

<div class="container">

<h2>⚔️ Ranking V2</h2>

  
<div id="rankingOverlay">
  <div id="rankingView">
    <button onclick="closeRankingView()">⬅️ Tilbake</button>

    <!-- SORTERING -->
    <div style="margin:10px 0;">
      <button onclick="setSort('elo')">⭐ ELO</button>
      <button onclick="setSort('wins')">🏆 Wins</button>
      <button onclick="setSort('top3')">🥇 Top 3</button>
    </div>

    <!-- FILTER -->
    <div id="rankingFilters" style="margin-bottom:10px;"></div>

    <div id="rankingViewList"></div>
  </div>
</div>

<div id="statsOverlay">
  <div id="statsView">
    <button onclick="closeStats()">⬅️ Tilbake</button>

    <div id="statsContent"></div>
  </div>
</div>

<div class="vs">
  <div class="choice" id="a"></div>
<div class="choice" id="b"></div>
</div>

<button onclick="draw()">🤝Uavgjort</button>

<div id="ranking"></div>

<hr>

<div id="tournamentSection">

  <h3>🏆 Turnering</h3>
  <button onclick="startTournament()">Start turnering</button>

  <div id="bracket"></div>

  <h3>Daglig turnering</h3>
  <div id="tournament"></div>

</div>

</div>

<button onclick="scrollToTop()" style="
  position:fixed;
  bottom:20px;
  right:20px;
  width:auto;
  padding:10px 12px;
  border-radius:50%;
  display:none;
" id="scrollBtn">
  ⬆
</button>

 <div id="addOverlay">
  <div id="addView">

    <button onclick="closeAddItem()">⬇️ Lukk</button>

    <h3>Legg til item</h3>

    <input id="itemInput" placeholder="Navn">

    <!-- SØK -->
    <input id="catSearch" placeholder="Søk kategori..."
      oninput="renderChips(this.value)">

    <!-- CHIPS -->
    <div class="chip-container" id="chipBox"></div>

    <!-- NY CATEGORY -->
    <input id="catInput" placeholder="Ny kategori">
    <button onclick="addCategory()">+ Kategori</button>

    <button onclick="addItem()">Legg til</button>

  </div>
</div>

</body>
</html>
