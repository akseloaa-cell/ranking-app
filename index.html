<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking App V2</title>

<style>
body {
  font-family: system-ui, -apple-system, Arial;
  background: radial-gradient(circle at top, #1a1f2e, #0b0f1a);
  color: #eaeaea;
  margin: 0;
  text-align: center;
}

.container {
  max-width: 460px;
  margin: auto;
  padding: 18px;
}

/* HEADLINE */
h2, h3 {
  font-weight: 700;
  letter-spacing: 0.5px;
}

/* INPUTS */
input {
  width: 80%;
  margin: 8px auto;
  display: block;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid #2a2f3a;
  background: #151a24;
  color: white;
  outline: none;
  transition: 0.2s;
}

input:focus {
  border-color: #4f8cff;
  box-shadow: 0 0 0 2px rgba(79,140,255,0.2);
}

/* BUTTONS */
button {
  width: 80%;
  margin: 8px auto;
  display: block;
  padding: 12px 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg,#4f8cff,#6aa6ff);
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-1px);
}

button:active {
  transform: scale(0.98);
}

/* CHIPS */
.chip-container {
  width: 80%;
  margin: 10px auto;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

.chip {
  padding: 6px 12px;
  background: #1b2230;
  border: 1px solid #2a3142;
  border-radius: 999px;
  cursor: pointer;
  font-size: 13px;
  transition: 0.2s;
}

.chip.active {
  background: #4f8cff;
  border-color: #4f8cff;
  color: white;
}

/* VS CARDS */
.vs {
  width: 80%;
  margin: 20px auto;
  display: flex;
  gap: 12px;
}

.choice {
  flex: 1;
  padding: 22px;
  background: #141a26;
  border: 1px solid #2a3142;
  border-radius: 14px;
  cursor: pointer;
  transition: 0.2s;
  font-weight: 600;
}

.choice:hover {
  border-color: #4f8cff;
  transform: translateY(-2px);
}

.choice:active {
  transform: scale(0.97);
}

/* RANKING */
#ranking {
  width: 80%;
  margin: 20px auto;
  text-align: left;
}

#ranking div {
  background: #141a26;
  border: 1px solid #2a3142;
  padding: 10px;
  border-radius: 10px;
  margin: 6px 0;
  transition: 0.2s;
}

#ranking div:hover {
  border-color: #4f8cff;
  transform: translateX(2px);
}

/* BRACKET */
.bracket {
  display: flex;
  overflow-x: auto;
  width: 80%;
  margin: auto;
  gap: 16px;
  padding-bottom: 10px;
}

.round {
  min-width: 140px;
}

.match {
  background: #141a26;
  border: 1px solid #2a3142;
  margin: 10px 0;
  padding: 10px;
  border-radius: 12px;
  font-size: 12px;
}

#scrollBtn {
  background: #4f8cff;
  color: white;
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}

/* OVERLAY */
#rankingOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);

  display: none;
  justify-content: center;
  align-items: flex-end;

  z-index: 999;
}

/* SELVE "SIDEN" */
#rankingView {
  width: 100%;
  max-width: 460px;
  height: 90%;
  box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
  background: #0b0f1a;
  border-radius: 20px 20px 0 0;
  overflow-y: auto;
  transform: translateY(100%);
  transition: 0.3s ease;
}

#statsOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);

  display: none;
  justify-content: center;
  align-items: flex-end;

  z-index: 1000;
}

#statsView {
  width: 100%;
  max-width: 460px;
  height: 75%;

  background: #0b0f1a;
  border-radius: 20px 20px 0 0;

  overflow-y: auto;

  transform: translateY(100%);
  transition: 0.3s ease;
}

/* TOUCH OPTIMIZED */
* {
  -webkit-tap-highlight-color: transparent;
}

</style>
</head>

<body>
<div class="container">

<h2>⚔️ Ranking V2</h2>

<input id="itemInput" placeholder="Legg til item">
  
<div id="rankingOverlay">
  <div id="rankingView">
    <button onclick="closeRankingView()">⬅️ Tilbake</button>

    <!-- SORTERING -->
    <div style="margin:10px 0;">
      <button onclick="setSort('elo')">⭐ ELO</button>
      <button onclick="setSort('wins')">🏆 Wins</button>
      <button onclick="setSort('top3')">🥇 Top 3</button>
    </div>

    <!-- FILTER -->
    <div id="rankingFilters" style="margin-bottom:10px;"></div>

    <div id="rankingViewList"></div>
  </div>
</div>

<div id="statsOverlay">
  <div id="statsView">
    <button onclick="closeStats()">⬅️ Tilbake</button>

    <div id="statsContent"></div>
  </div>
</div>

<div class="chip-container" id="chipBox"></div>

<input id="catInput" placeholder="Ny kategori">
<button onclick="addCategory()">+ Kategori</button>

<button onclick="addItem()">Legg til</button>

<div class="vs">
  <div class="choice" id="a" onclick="pick(0)">-</div>
  <div class="choice" id="b" onclick="pick(1)">-</div>
</div>

<button onclick="draw()">Uavgjort</button>

<div id="ranking"></div>

<hr>

<h3>🏆 Turnering</h3>
<button onclick="startTournament()">Start turnering</button>

<div id="bracket"></div>

<h3>Daglig turnering</h3>
<div id="tournament"></div>

</div>

<button onclick="scrollToTop()" style="
  position:fixed;
  bottom:20px;
  right:20px;
  width:auto;
  padding:10px 12px;
  border-radius:50%;
  display:none;
" id="scrollBtn">
  ⬆
</button>

<script>
/* ================= STATE ================= */
const state = {
  items: JSON.parse(localStorage.getItem("items")) || [],
  categories: JSON.parse(localStorage.getItem("categories")) || [],
  current: [],
  tournament: JSON.parse(localStorage.getItem("dailyTournament")) || null, // NEW
  bracket: [],
  round: 0,
  match: 0,
  showAll: false,
  rankingFilter: "all",
  rankingSort: "elo"
};
// 🔥 Rydd categories
state.categories = state.categories
  .filter(c => c && typeof c === "string" && c.trim() !== "")
  .map(c => c.trim());

state.items.forEach(i => {
  if(!i.history) i.history = [];
  if(i.history.length === 0) i.history.push(i.rating || 1000);
});

/* ================= SAVE ================= */
function save(){
  localStorage.setItem("items", JSON.stringify(state.items));
  localStorage.setItem("categories", JSON.stringify(state.categories));
}

/* ================= CATEGORY ================= */
function normalize(c){
  return c.trim().toLowerCase();
}

function addCategory(){
  let v = document.getElementById("catInput").value;

  if(!v || !v.trim()) return;

  v = normalize(v);

  if(!state.categories.includes(v)){
    state.categories.push(v);
  }

  document.getElementById("catInput").value = "";
  renderChips();
  save();
}

function renderChips(){
  const box = document.getElementById("chipBox");

  box.innerHTML = state.categories
    .filter(c => c && c.trim() !== "")
    .map(c => `
      <div class="chip" onclick="toggleCat(this)">${c}</div>
    `).join("");
}

function toggleCat(el){
  el.classList.toggle("active");
}

/* ================= ITEMS ================= */
function addItem(){
  let name = document.getElementById("itemInput").value;
  if(!name) return;

  let selected = [...document.querySelectorAll(".chip.active")]
    .map(x => x.innerText);

 state.items.push({
  id: Date.now(),
  name,
  categories: selected,
  rating: 1000,

  // NEW V3 STATS
  history: [1000],
  tournamentsPlayed: 0,
  tournamentWins: 0,
  top3: 0
});

  document.getElementById("itemInput").value = "";
  save();
  update();
  nextMatch();
}

function updateHistory(item){
  if(!item.history) item.history = [];
  item.history.push(item.rating);

  if(item.history.length > 30){
    item.history.shift();
  }
}

/* ================= MATCH ================= */
function nextMatch(){
  if(state.items.length < 2) return;

  let a = Math.floor(Math.random()*state.items.length);
  let b;

  do { b = Math.floor(Math.random()*state.items.length) }
  while(a===b);

  state.current = [state.items[a], state.items[b]];

  document.getElementById("a").innerText = state.current[0].name;
  document.getElementById("b").innerText = state.current[1].name;
}

function pick(i){
  let w = state.current[i];
  let l = state.current[1-i];

  let Ea = 1/(1+Math.pow(10,(l.rating-w.rating)/400));

  w.rating += 32*(1-Ea);
  l.rating += 32*(0-(1-Ea));
  updateHistory(w);
  updateHistory(l);

  save();
  update();
  nextMatch();
}

function draw(){
  if(!state.current.length) return;

  let a = state.current[0];
  let b = state.current[1];

  updateHistory(a);
  updateHistory(b);

  save();
  update();
  nextMatch();
}


/* ================= RANKING ================= */
function update(){
  let sorted = [...state.items].sort((a,b)=>b.rating-a.rating);

  let list = sorted.slice(0,10); // 🔥 kun top 10 nå

  document.getElementById("ranking").innerHTML =
    "<h3>🏆 Ranking</h3>" +

    `<button onclick="openRankingView()">📊 Full ranking</button>` +

    list.map((x,i)=>
      `<div onclick="showStats(${x.id})"
            style="cursor:pointer; padding:10px; background:#1f1f1f; margin:5px 0; border-radius:10px;">
        ${i+1}. ${x.name} (${Math.round(x.rating)})
      </div>`
    ).join("");
}

/* ================= TOURNAMENT ================= */
function startTournament(){
  let pool = [...state.items];

  if(pool.length < 4){
    alert("Trenger flere items");
    return;
  }

  pool = pool.sort(()=>Math.random()-0.5);

  let round = [];
  for(let i=0;i<pool.length;i+=2){
    round.push({a:pool[i], b:pool[i+1], winner:null});
  }

  state.bracket = [round];
  state.round = 0;
  state.match = 0;

  renderBracket();
}

function renderBracket(){
  let html = "<div class='bracket'>";

  state.bracket.forEach((r,ri)=>{
    html += "<div class='round'>";

    r.forEach(m=>{
      html += `<div class="match">
        ${m.a.name}<br>
        ${m.b.name}
      </div>`;
    });

    html += "</div>";
  });

  html += "</div>";

  document.getElementById("bracket").innerHTML = html;
}

/* INIT */

function renderTournament(){
  const el = document.getElementById("tournament");

  if(!state.tournament){
    el.innerHTML = "Ingen turnering i dag";
    return;
  }

  const t = state.tournament;

  if(t.done){
    el.innerHTML = `
      🏆 Turnering ferdig!<br>
      Kategori: ${t.category}
    `;
    return;
  }

  const match = t.rounds[t.currentRound][t.currentMatch];

  el.innerHTML = `
    🏆 Kategori: ${t.category}<br><br>

    <div class="vs">
      <div class="choice" onclick="pickTournamentWinner(0)">
        ${match.a.name}
      </div>
      <div class="choice" onclick="pickTournamentWinner(1)">
        ${match.b.name}
      </div>
    </div>
  `;
}

function getToday(){
  return new Date().toISOString().split("T")[0];
}

function initDailyTournament(){
  const today = getToday();

  if(state.tournament && state.tournament.date === today) return;

  if(state.items.length < 4) return;

  const cats = [...new Set(state.items.flatMap(i => i.categories))];
  if(cats.length === 0) return;

  const category = cats[Math.floor(Math.random()*cats.length)];

  let pool = state.items.filter(i => i.categories.includes(category));
  if(pool.length < 4) return;

  pool = pool.sort(()=>Math.random()-0.5);

  const size = Math.pow(2, Math.floor(Math.log2(pool.length)));
  pool = pool.slice(0, size);

  let rounds = [];
  let round = [];

  for(let i=0;i<pool.length;i+=2){
    round.push({a:pool[i], b:pool[i+1], winner:null});
  }

  rounds.push(round);

  state.tournament = {
    date: today,
    category,
    rounds,
    currentRound: 0,
    currentMatch: 0,
    done:false
  };

  saveTournament();
}

function saveTournament(){
  localStorage.setItem("dailyTournament", JSON.stringify(state.tournament));
}

function pickTournamentWinner(i){
  const t = state.tournament;
  const match = t.rounds[t.currentRound][t.currentMatch];

  const winner = i === 0 ? match.a : match.b;
  const loser = i === 0 ? match.b : match.a;

  match.winner = winner.id;

  // liten ELO påvirkning
  let Ea = 1/(1+Math.pow(10,(loser.rating-winner.rating)/400));
  winner.rating += 8*(1-Ea);
  loser.rating += 8*(0-(1-Ea));

  // neste match
  t.currentMatch++;

  if(t.currentMatch >= t.rounds[t.currentRound].length){
    advanceRound();
  }

  saveTournament();
  save();
  renderTournament();
  update();
}

function advanceRound(){
  const t = state.tournament;

  let winners = t.rounds[t.currentRound]
    .map(m => m.winner ? state.items.find(x => x.id === m.winner) : null)
    .filter(Boolean);

  // 📊 stats: alle som vant en kamp = deltatt
  winners.forEach(w => {
    w.tournamentsPlayed = (w.tournamentsPlayed || 0) + 1;
  });

  // ferdig turnering
  if(winners.length === 1){
    finishTournament(winners[0]);
    return;
  }

  let next = [];

  for(let i=0;i<winners.length;i+=2){
    next.push({a:winners[i], b:winners[i+1], winner:null});
  }

  t.rounds.push(next);
  t.currentRound++;
  t.currentMatch = 0;
}

function finishTournament(winner){
  state.tournament.done = true;

  winner.tournamentWins = (winner.tournamentWins || 0) + 1;

  let sorted = [...state.items].sort((a,b)=>b.rating-a.rating);

  sorted.slice(0,3).forEach((x,i)=>{
    x.top3 = (x.top3 || 0) + 1;

    if(i===0) x.rating += 50;
    if(i===1) x.rating += 25;
    if(i===2) x.rating += 10;
  });

  save();
  saveTournament();
  update();
  renderTournament();
}

function showStats(id){
  const item = state.items.find(x => x.id === id);
  if(!item) return;

  const rank = [...state.items]
    .sort((a,b)=>b.rating-a.rating)
    .findIndex(x => x.id === id) + 1;

  const trend = item.history?.slice(-5) || [];

  document.getElementById("statsContent").innerHTML = `
    <div style="padding:20px; text-align:left;">
      <h2>${item.name}</h2>

      <p>🏆 Rank: ${rank}</p>
      <p>⭐ ELO: ${Math.floor(item.rating)}</p>

      <p>📂 ${item.categories.map(c => `
        <span onclick="removeCatFromItem(${item.id}, '${c}')"
          style="background:#222;padding:4px 8px;margin:2px;border-radius:999px;display:inline-block;cursor:pointer;">
          ${c} ✕
        </span>
      `).join(" ")}</p>

      <div style="margin-top:10px;">
        <input id="newCatInput" placeholder="Legg til kategori"
          style="width:70%; padding:8px; border-radius:8px; border:none;">
        <div style="margin-top:10px;">
  <p style="opacity:0.7; margin-bottom:6px;">Velg eksisterende kategori:</p>

        <button onclick="addCatToItem(${item.id})" style="width:25%;">
          +
        </button>
      </div>

  <div style="display:flex; flex-wrap:wrap; gap:6px;">
    ${state.categories.map(c => `
      <span onclick="addCatToItem(${item.id}, '${c}')"
        style="
          background:#222;
          padding:6px 10px;
          border-radius:999px;
          cursor:pointer;
          font-size:12px;
        ">
        ${c}
      </span>
    `).join("")}
  </div>
</div>

      <p>📈 ${trend.map(x => Math.round(x)).join(" → ")}</p>

      <hr>

      <p>🏆 Wins: ${item.tournamentWins || 0}</p>
      <p>🥇 Top 3: ${item.top3 || 0}</p>
      <p>🎮 Played: ${item.tournamentsPlayed || 0}</p>
    </div>
  `;

  openStats();
}

function addCatToItem(id, valOverride){
  const item = state.items.find(x => x.id === id);
  if(!item) return;

  let val = valOverride || document.getElementById("newCatInput").value;
  if(!val || !val.trim()) return;

  val = val.trim().toLowerCase();

  if(!item.categories.includes(val)){
    item.categories.push(val);
  }

  save();
  showStats(id);
  renderChips();
}

function removeCatFromItem(id, cat){
  const item = state.items.find(x => x.id === id);
  if(!item) return;

  item.categories = item.categories.filter(c => c !== cat);

  save();
  showStats(id);
  renderChips();
}

function openRankingView(){
  const overlay = document.getElementById("rankingOverlay");
  const view = document.getElementById("rankingView");

  overlay.style.display = "flex";

  setTimeout(() => {
    view.style.transform = "translateY(0)";
  }, 10);

  renderRankingView();
}

function closeRankingView(){
  const overlay = document.getElementById("rankingOverlay");
  const view = document.getElementById("rankingView");

  view.style.transform = "translateY(100%)";

  setTimeout(() => {
    overlay.style.display = "none";
  }, 300);
}

function renderRankingView(){
  let list = [...state.items];

  // FILTER
  if(state.rankingFilter !== "all"){
    list = list.filter(x =>
      (x.categories || []).includes(state.rankingFilter)
    );
  }

  // SORTERING
  if(state.rankingSort === "elo"){
    list.sort((a,b)=>b.rating-a.rating);
  }

  if(state.rankingSort === "wins"){
    list.sort((a,b)=>(b.tournamentWins||0)-(a.tournamentWins||0));
  }

  if(state.rankingSort === "top3"){
    list.sort((a,b)=>(b.top3||0)-(a.top3||0));
  }

  const html = list.map((x,i)=>`
    <div onclick="showStats(${x.id})"
      style="
        padding:12px;
        margin:6px 0;
        background:#1f1f1f;
        border-radius:12px;
        cursor:pointer;
      ">
      <b>#${i+1}</b> ${x.name}
      <span style="float:right; opacity:0.7;">
        ${Math.round(x.rating)}
      </span>
    </div>
  `).join("");

  document.getElementById("rankingViewList").innerHTML =
    "<h3>🏆 Full ranking</h3>" + html;

  renderRankingFilters();
}

function setRankingFilter(cat){
  state.rankingFilter = cat;
  renderRankingView();
}

function scrollToTop(){
  document.getElementById("rankingView").scrollTo({
    top: 0,
    behavior: "smooth"
  });
}

document.getElementById("rankingView").addEventListener("scroll", () => {
  const btn = document.getElementById("scrollBtn");

  if(document.getElementById("rankingView").scrollTop > 200){
    btn.style.display = "block";
  } else {
    btn.style.display = "none";
  }
});

function renderRankingFilters(){
  const container = document.getElementById("rankingFilters");

  const cats = ["all", ...state.categories];

  container.innerHTML = cats.map(c => `
    <span onclick="setRankingFilter('${c}')"
      style="
        padding:6px 10px;
        margin:4px;
        border-radius:999px;
        background:${state.rankingFilter === c ? '#4f8cff' : '#222'};
        cursor:pointer;
        display:inline-block;
      ">
      ${c}
    </span>
  `).join("");
}

function setSort(type){
  state.rankingSort = type;
  renderRankingView();
}

function openStats(){
  const overlay = document.getElementById("statsOverlay");
  const view = document.getElementById("statsView");

  overlay.style.display = "flex";

  setTimeout(() => {
    view.style.transform = "translateY(0)";
  }, 10);
}

function closeStats(){
  const overlay = document.getElementById("statsOverlay");
  const view = document.getElementById("statsView");

  view.style.transform = "translateY(100%)";

  setTimeout(() => {
    overlay.style.display = "none";
  }, 300);
}

// klikk utenfor lukker
document.getElementById("statsOverlay").addEventListener("click", (e)=>{
  if(e.target.id === "statsOverlay"){
    closeStats();
  }
});

renderChips();
update();
nextMatch();
initDailyTournament();
renderTournament();

</script>
</body>
</html>
