<!DOCTYPE html>
<html>
<head>
  <title>Ranking App</title>
  <link rel="icon" href="file_000000006acc720aabe74bd60fd54078.png">
<link rel="apple-touch-icon" href="file_000000006acc720aabe74bd60fd54078.png">
<link rel="manifest" href="manifest.json">
  <style>
    body {
  font-family: system-ui, Arial;
  background: linear-gradient(180deg, #0f0f0f, #1a1a1a);
  color: white;
  text-align: center;
  margin: 0;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

h1 {
  font-size: 28px;
  margin-bottom: 20px;
}

input {
  width: 80%;
  padding: 12px;
  margin: 6px;
  border-radius: 12px;
  border: none;
  background: #222;
  color: white;
  outline: none;
}

button {
  padding: 12px 16px;
  margin: 6px;
  border-radius: 12px;
  border: none;
  background: #4f8cff;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #3b78ff;
}

.vs {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.choice {
  flex: 1;
  padding: 30px;
  background: #1f1f1f;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.2s;
  font-size: 18px;
  font-weight: bold;
}

.choice:hover {
  transform: scale(1.03);
  background: #2a2a2a;
}

#ranking {
  margin-top: 25px;
  text-align: left;
  background: #151515;
  padding: 15px;
  border-radius: 12px;
}

#ranking div {
  padding: 6px 0;
}
  </style>
</head>
<body>

  <div class="container">
  <h1>⚔️ The Ultimate Ranking</h1>

  <input id="newItem" placeholder="Legg til noe">
<input id="newCategory" placeholder="Kategori (f.eks mat, musikk)">
<button onclick="addItem()">Legg til</button>

  <div class="vs">
    <div class="choice" onclick="choose(0)" id="a">-</div>
    <div class="choice" onclick="choose(1)" id="b">-</div>
  </div>

  <div id="ranking"></div>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem("items")) || [];
    items = items.map(item => ({
  id: item.id || Date.now() + Math.random(),
  name: item.name,
  category: item.category || "ukjent",
  rating: item.rating
}));
let current = [];

function save() {
  localStorage.setItem("items", JSON.stringify(items));
}

function addItem() {
  const name = document.getElementById("newItem").value;
  const category = document.getElementById("newCategory").value;

  if (!name || !category) return;

  items.push({
    id: Date.now() + Math.random(),
    name,
    category,
    rating: 1000
  });

  document.getElementById("newItem").value = "";
  document.getElementById("newCategory").value = "";

  save();
  update();
  newMatch();
}

function expected(a, b) {
  return 1 / (1 + Math.pow(10, (b - a) / 400));
}

function updateElo(w, l) {
  const K = 32;
  let Ew = expected(w.rating, l.rating);

  w.rating += K * (1 - Ew);
  l.rating += K * (0 - (1 - Ew));
}

function newMatch() {
  if (items.length < 2) {
    document.getElementById("a").innerText = "Legg til flere items";
    document.getElementById("b").innerText = "";
    return;
  }

  let a = Math.floor(Math.random() * items.length);
  let b;
  do { b = Math.floor(Math.random() * items.length); }
  while (a === b);

  current = [items[a], items[b]];

  document.getElementById("a").innerText = current[0].name;
  document.getElementById("b").innerText = current[1].name;
}

function choose(i) {
  if (!current || current.length < 2) return;

  updateElo(current[i], current[1 - i]);

  save();
  update();
  newMatch();
}

function update() {
  let sorted = [...items].sort((a,b)=>b.rating-a.rating);

  document.getElementById("ranking").innerHTML =
    "<h3>🏆 Ranking</h3>" +
    sorted.map((x,i)=>
  `${i+1}. ${x.name} <span onclick="editCategory(${x.id})" style="cursor:pointer; color:#4f8cff;">
  [${x.category || "ingen kategori"}]
</span> (${Math.round(x.rating)})`
).join("<br>");
}

function normalizeCategory(cat) {
  if (!cat) return "ukjent";

  return cat
    .trim()
    .toLowerCase()
    .replace(/\b\w/g, c => c.toUpperCase());
}

function editCategory(id) {
  let item = items.find(x => x.id === id);
  if (!item) return;

  let newCategory = prompt("Ny kategori:", item.category || "");

  if (newCategory === null) return;

  item.category = normalizeCategory(newCategory);

  save();
  update();
}

update();
newMatch();
    document.getElementById("newItem").addEventListener("keydown", function(e) {
  if (e.key === "Enter") addItem();
});
  </script>

</body>
</html>
